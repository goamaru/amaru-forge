<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amaru Forge</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="window-frame">
  <div id="titlebar" data-tauri-drag-region>
    <div id="window-controls">
      <button class="win-btn close" id="win-close"></button>
      <button class="win-btn minimize" id="win-minimize"></button>
      <button class="win-btn maximize" id="win-maximize"></button>
    </div>
    <div id="titlebar-label" data-tauri-drag-region>
      <img src="img/logo.png" alt="" class="titlebar-logo" draggable="false">
      <span data-tauri-drag-region>Amaru Forge</span>
    </div>
  </div>
  <div id="app">
    <aside id="sidebar">
      <button id="new-session-btn">+ New Session</button>
      <input type="text" id="search" placeholder="Search sessions..." autocomplete="off">
      <div id="session-list"></div>
    </aside>
    <div id="sidebar-resize" class="resize-handle" data-edge="left"></div>
    <main id="terminal-area">
      <div id="tab-bar"><div id="active-tab"></div></div>
      <div id="terminal-workspace">
        <div id="terminal-shell">
          <div id="terminal-container"></div>
        </div>
        <div id="editor-resize" class="resize-handle" data-edge="right" style="display:none;"></div>
        <section id="editor-panel" style="display:none;">
          <div id="editor-header">
            <div id="editor-header-text">
              <div id="editor-path">Inline Editor</div>
              <div id="editor-meta">
                <span id="editor-location">Ln 1, Col 1</span>
                <span id="editor-status"></span>
              </div>
            </div>
            <div id="editor-actions">
              <button id="editor-save" class="editor-action-btn">Save</button>
              <button id="editor-close" class="editor-icon-btn" aria-label="Close editor">&times;</button>
            </div>
          </div>
          <div id="editor-view"></div>
          <form id="editor-assistant">
            <label for="editor-assistant-input" id="editor-assistant-label">Ask Amaru</label>
            <textarea
              id="editor-assistant-input"
              placeholder="Describe the change for the current file or selection..."
              rows="3"
            ></textarea>
            <div id="editor-assistant-footer">
              <div id="editor-assistant-context">Open a file to ask for an edit.</div>
              <button type="submit" id="editor-assistant-send">Insert in Terminal</button>
            </div>
          </form>
        </section>
      </div>
    </main>
    <div id="panel-resize" class="resize-handle" data-edge="right" style="display:none;"></div>
    <aside id="side-panel" style="display:none;">
      <div id="panel-tabs">
        <button class="panel-tab active" data-tab="spec">Spec</button>
        <button class="panel-tab" data-tab="notes">Notes</button>
      </div>
      <div id="panel-header">
        <div><div id="panel-title"></div><div id="panel-meta"></div></div>
        <button id="panel-close">&times;</button>
      </div>
      <div id="panel-body"></div>
    </aside>
    <div id="context-menu" style="display:none;">
      <button data-action="rename">Rename</button>
      <button data-action="pin">Pin / Unpin</button>
      <hr>
      <button data-action="delete" class="danger">Delete Session</button>
    </div>
    <div id="setup-screen" style="display:none;">
      <div class="setup-content">
        <h2>Amaru Forge requires tmux</h2>
        <p>Install it with:</p>
        <code id="setup-command">brew install tmux</code>
        <button id="setup-copy">Copy Command</button>
        <button id="setup-retry">Retry</button>
      </div>
    </div>
  </div>
  </div>
  <script type="module" src="bundle.js"></script>
</body>
</html>
